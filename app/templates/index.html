<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Docs Semantic Search</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

  header { background: #232f3e; padding: 1.5rem 2rem;
           display: flex; align-items: center; gap: 1rem; }
  header h1 { color: #ff9900; font-size: 1.4rem; font-weight: 700; }
  header span { color: #aab7c4; font-size: 0.9rem; }

  .container { max-width: 860px; margin: 2rem auto; padding: 0 1.5rem; }

  .search-box { background: white; border-radius: 12px;
                padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .search-row { display: flex; gap: 0.75rem; }
  input[type="text"] { flex: 1; padding: 0.75rem 1rem; border: 2px solid #e0e0e0;
                        border-radius: 8px; font-size: 1rem; outline: none;
                        transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: #ff9900; }
  button { background: #ff9900; color: white; border: none; padding: 0.75rem 1.5rem;
           border-radius: 8px; font-size: 1rem; font-weight: 600;
           cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  button:hover { background: #e68900; }
  button:disabled { background: #ccc; cursor: not-allowed; }

  .hint { margin-top: 0.75rem; color: #888; font-size: 0.85rem; }
  .hint span { background: #fff3e0; color: #e65c00; padding: 2px 8px;
               border-radius: 4px; margin-right: 6px; cursor: pointer;
               font-size: 0.8rem; display: inline-block; margin-top: 4px; }
  .hint span:hover { background: #ffe0b2; }

  .stats { margin: 1.25rem 0 0.75rem; color: #555; font-size: 0.9rem; }
  .stats strong { color: #232f3e; }

  .results { display: flex; flex-direction: column; gap: 1rem; }

  .card { background: white; border-radius: 10px; padding: 1.25rem 1.5rem;
          box-shadow: 0 1px 4px rgba(0,0,0,0.07); border-left: 4px solid #ff9900;
          transition: box-shadow 0.2s; }
  .card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.12); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .card-title { font-size: 1rem; font-weight: 600; color: #232f3e; }
  .card-title a { color: inherit; text-decoration: none; }
  .card-title a:hover { color: #ff9900; }
  .score-badge { background: #e8f5e9; color: #2e7d32; font-size: 0.78rem;
                 font-weight: 700; padding: 3px 10px; border-radius: 20px;
                 white-space: nowrap; margin-left: 1rem; }
  .card-snippet { margin-top: 0.5rem; font-size: 0.88rem; color: #555;
                  line-height: 1.6; }
  .card-url a { margin-top: 0.6rem; font-size: 0.78rem; color: #ff9900;
               word-break: break-all; text-decoration: none; }
  .card-url a:hover { text-decoration: underline; }

  .loading { text-align: center; padding: 2rem; color: #888; }
  .empty { text-align: center; padding: 3rem; color: #aaa; font-size: 0.95rem; }
  .error { background: #fff3f3; border: 1px solid #ffcdd2; border-radius: 8px;
           padding: 1rem; color: #c62828; margin-top: 1rem; font-size: 0.9rem; }
</style>
</head>
<body>

<header>
  <h1>⚡ AWS Docs Semantic Search</h1>
  <span>Powered by FAISS + BM25 · Served from S3 Files</span>
</header>

<div class="container">
  <div class="search-box">
    <div class="search-row">
      <input type="text" id="query" placeholder="e.g. why is my container keep stopping in ECS"
             onkeydown="if(event.key==='Enter') doSearch()" />
      <button id="btn" onclick="doSearch()">Search</button>
    </div>
    <div class="hint">
      Try:
      <span onclick="setQuery('S3 connection timeout handling')">S3 connection timeout</span>
      <span onclick="setQuery('ECS task stopped unexpectedly')">ECS task stopped</span>
      <span onclick="setQuery('Lambda cold start optimization')">Lambda cold start</span>
      <span onclick="setQuery('IAM permission denied S3')">IAM permission denied</span>
    </div>
  </div>

  <div id="stats" class="stats" style="display:none"></div>
  <div id="results" class="results"></div>
</div>

<script>
  function setQuery(q) {
    document.getElementById("query").value = q;
    doSearch();
  }

  async function doSearch() {
    const query = document.getElementById("query").value.trim();
    if (!query) return;

    const btn     = document.getElementById("btn");
    const results = document.getElementById("results");
    const stats   = document.getElementById("stats");

    btn.disabled    = true;
    btn.textContent = "Searching...";
    results.innerHTML = '<div class="loading">Searching AWS docs...</div>';
    stats.style.display = "none";

    try {
      const t0  = performance.now();
      const res = await fetch("/search", {
        method:  "POST",
        headers: {"Content-Type": "application/json"},
        body:    JSON.stringify({query, top_k: 10, alpha: 0.6}),
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      const ms   = (performance.now() - t0).toFixed(0);

      stats.style.display = "block";
      stats.innerHTML = `Found <strong>${data.total}</strong> results for 
                         <strong>"${data.query}"</strong> in <strong>${ms}ms</strong>`;

      if (!data.results.length) {
        results.innerHTML = '<div class="empty">No results found. Try a different query.</div>';
        return;
      }

      results.innerHTML = data.results.map((r, i) => `
        <div class="card">
          <div class="card-header">
            <div class="card-title">
              ${i + 1}. <a href="${r.url}" target="_blank" rel="noopener">${r.title || r.id}</a>
            </div>
            <div class="score-badge">score ${r.score}</div>
          </div>
          <div class="card-snippet">${r.snippet || "No preview available."}</div>
          ${r.url ? `<div class="card-url"><a href="${r.url}" target="_blank" rel="noopener">🔗 ${r.url}</a></div>` : ""}
        </div>
      `).join("");

    } catch (err) {
      results.innerHTML = `<div class="error">Error: ${err.message}</div>`;
    } finally {
      btn.disabled    = false;
      btn.textContent = "Search";
    }
  }
</script>

</body>
</html>
